<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Quiz Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Medical Quiz Tool</h1>
            <p class="subtitle">Convert Medical Questions into Interactive Quizzes</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <h2>📝 Paste Your Question</h2>
                <textarea id="questionInput" rows="10" placeholder="Paste your medical question in the standard format (Question #, Case, Options A-D, Correct Answer, Explanation, Distractor Analysis)..."></textarea>
                <p class="help-text">💡 Format: Question [#] | Case Description | Question Text | Options (A-D) | Correct Answer | Explanation | Distractor Analysis</p>
                <button class="btn-primary" onclick="loadQuestion()">Load Question</button>
                <button class="btn-secondary" onclick="clearAll()">Clear All</button>
            </div>

            <div id="quizContainer"></div>
        </div>

        <footer>
            <p>Medical Quiz Tool v1.0 | Created for interactive medical education</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
