<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Quiz Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Medical Quiz Tool</h1>
            <p class="subtitle">Convert Questions to Interactive Quizzes</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <h2>📝 Paste Your Question</h2>
                <textarea 
                    id="questionInput" 
                    placeholder="Paste your medical question here..."
                    rows="10"
                ></textarea>
                <p class="help-text">Supported format: Question number, case description, question text, options A-D, correct answer with explanation, distractor analysis</p>
                <button class="btn-primary" onclick="loadQuestion()">📥 Load Question</button>
                <button class="btn-secondary" onclick="clearAll()">🔄 Clear</button>
            </div>

            <div id="quizContainer"></div>
        </div>

        <footer>
            <p>© 2026 Medical Quiz Tool | Smart Question Parser & Interactive Learning</p>
        </footer>
    </div>

    <script src="script.js"><\/script>
</body>
</html>
